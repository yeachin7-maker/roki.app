name: CI/CD Pipeline

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run check

  deploy:
    runs-on: self-hosted
    needs: test   # ✅ ensures deploy runs after test success

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run the application
        run: |
          ls -lrt
          pm2 status 
          pm2 delete node-app || true
          pm2 start "npm start" --name node-app
          pm2 save