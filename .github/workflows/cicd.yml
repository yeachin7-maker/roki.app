name: CICD pipeline

on: [push]

jobs:
  test:
      runs-on: ubuntu-latest
      steps:
        - name: checkout the repo
          uses: actions/checkout@v3

        - name: Install Node.Js
          uses: actions/setup-node@v4
          with:
              node-version: "22"
        - name: npm install
          run: npm install

        - name: Test the application
          run: npm run check 
